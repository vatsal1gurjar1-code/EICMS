# docker-compose.yml - EICMS development environment
#
# This stack runs only the application containers:
#   1. backend  - FastAPI API server
#   2. frontend - React/Vite app
#
# The database is external. Set DATABASE_URL in .env to your Supabase
# PostgreSQL connection string. No local PostgreSQL container is created.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eicms_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: >
      uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    dns:
      - 8.8.8.8
      - 8.8.4.4

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eicms_frontend
    restart: unless-stopped
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
