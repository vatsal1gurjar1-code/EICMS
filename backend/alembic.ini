# alembic.ini — Alembic Database Migration Configuration
# ──────────────────────────────────────────────────────
# Alembic manages database schema changes (migrations).
# When you add or change a model, Alembic generates a migration
# file that updates the database safely.
#
# COMMON COMMANDS:
#   Generate a new migration: docker compose exec backend alembic revision --autogenerate -m "describe change"
#   Apply all migrations:     docker compose exec backend alembic upgrade head
#   Rollback one migration:   docker compose exec backend alembic downgrade -1
#   View migration history:   docker compose exec backend alembic history

[alembic]
script_location = alembic
prepend_sys_path = .

# We get the database URL from the environment, not hardcoded here
sqlalchemy.url = %(DATABASE_URL)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
