# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — EICMS Production Environment
# ─────────────────────────────────────────────────────────────────────────────
#
# This file OVERRIDES docker-compose.yml for production.
# Run with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key differences from development:
#   - Backend uses gunicorn with multiple workers (not the single-thread dev server)
#   - Frontend is compiled and served by nginx (not the Vite dev server)
#   - No source code volume mounts (code is baked into the image)
#   - Database port is NOT exposed to the internet
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    restart: always
    ports: []  # Remove the exposed port — DB should NOT be accessible from the internet
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: always
    volumes: []  # No source mount — code is baked into the Docker image
    command: >
      sh -c "alembic upgrade head &&
             gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"
    #         ↑ 4 parallel workers for production performance

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    volumes: []  # No source mount — compiled build is baked into the image
    ports:
      - "80:80"    # Serve on standard HTTP port
      - "443:443"  # HTTPS (SSL certificate must be configured separately)
