# docker-compose.prod.yml - EICMS production overrides
#
# Run with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# The database is external Supabase PostgreSQL. Set DATABASE_URL in .env.

services:
  backend:
    restart: always
    volumes: []
    command: >
      gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  frontend:
    restart: always
    volumes: []
    ports:
      - "80:80"
      - "443:443"
